<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>앱 캐시 초기화</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #101417;
        color: #eef5f3;
        font-family: system-ui, -apple-system, "Segoe UI", "Noto Sans KR", sans-serif;
        line-height: 1.55;
      }
      main {
        max-width: 560px;
        margin: 0 auto;
        border: 1px solid #334147;
        border-radius: 8px;
        padding: 18px;
        background: #171d21;
      }
      a {
        color: #7fb3ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>앱 캐시 초기화 중</h1>
      <p id="status">서비스워커와 캐시를 지우고 있습니다.</p>
      <p><a href="/">바로 돌아가기</a></p>
    </main>
    <script>
      (async () => {
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
          localStorage.removeItem("coastForecast:lastEndDate");
          document.getElementById("status").textContent = "초기화 완료. 앱으로 돌아갑니다.";
        } catch (error) {
          document.getElementById("status").textContent = "초기화 중 일부 실패. 앱으로 돌아갑니다.";
        }
        setTimeout(() => {
          location.replace("/");
        }, 700);
      })();
    </script>
  </body>
</html>
